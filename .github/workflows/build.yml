name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (vcpkg manifest mode auto-installs deps)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Collect release files
        run: |
          mkdir release

          # Executable (double-click = GUI, CLI args = CLI)
          cp build/Release/filesigner.exe release/

          # OpenSSL DLLs (manifest mode: vcpkg_installed in build dir)
          cp build/vcpkg_installed/x64-windows/bin/libcrypto-3-x64.dll release/
          cp build/vcpkg_installed/x64-windows/bin/libssl-3-x64.dll release/

          # List files
          dir release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileSigner
          path: release/

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path release/* -DestinationPath FileSigner-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FileSigner-${{ github.ref_name }}.zip
          generate_release_notes: true
